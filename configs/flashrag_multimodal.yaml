project_name: flashrag_multimodal
seed: 42
output_dir: workspace/multimodal

embedding:
  model_name: openai/clip-vit-base-patch32
  backend: vision
  dimension: 512
  batch_size: 32
  device: cpu
  normalize: true

retriever:
  backend: faiss
  top_k: 5
  use_bm25: false
  use_hybrid: false
  use_reranker: false

generator:
  model_name: gpt2
  backend: huggingface
  max_new_tokens: 256
  temperature: 0.7
  device: cpu
  prompt_template: default

data:
  chunk_size: 512
  chunk_overlap: 64
  chunk_strategy: recursive
  supported_formats:
    - pdf
    - html
    - md
    - csv
    - txt
    - jpg
    - png

analytics:
  metrics:
    - recall@5
    - mrr
  output_dir: workspace/multimodal/eval
