project_name: flashrag_agentic
seed: 42
output_dir: workspace/agentic

embedding:
  model_name: all-MiniLM-L6-v2
  backend: sentence_transformer
  dimension: 384
  batch_size: 64
  device: cpu
  normalize: true

retriever:
  backend: faiss
  top_k: 5
  use_bm25: false
  use_hybrid: false
  use_reranker: false

generator:
  model_name: gpt2
  backend: huggingface
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  do_sample: true
  device: cpu
  prompt_template: default

data:
  chunk_size: 512
  chunk_overlap: 64
  chunk_strategy: recursive

analytics:
  metrics:
    - recall@5
    - mrr
    - ndcg@10
    - faithfulness
    - relevance
  output_dir: workspace/agentic/eval
